# Used only by manual build-project.yaml (metadata-action). Fork push builds use cicd-pipeline + dev-versioning.md.
branches-template:
  - main: "latest, main"
  - "feature/*": "{{ref-name}}-{{timestamp}}, {{dist-tag}}"
  - "bugfix/*": "{{ref-name}}-{{timestamp}}, {{dist-tag}}"
  - tag: "v{{major}}.{{minor}}.{{patch}}, {{dist-tag}}"

distribution-tag:
  - main: "latest"
  - "feature/*": "dev"
  - "bugfix/*": "dev"
  - tag: "stable"
