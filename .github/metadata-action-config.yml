# Used by build-project.yaml (metadata-action).
# cicd-pipeline.yaml: main -> latest; other branches -> {branch_with_underscores}_v{N}.
branches-template:
  - main: "latest, main"
  - "feature/*": "{{ref-name}}-{{timestamp}}, {{dist-tag}}"
  - "bugfix/*": "{{ref-name}}-{{timestamp}}, {{dist-tag}}"
  - tag: "v{{major}}.{{minor}}.{{patch}}, {{dist-tag}}"

distribution-tag:
  - main: "latest"
  - "feature/*": "dev"
  - "bugfix/*": "dev"
  - tag: "stable"
