---
# Fork CI dev builds: image tag latest or {branch}_v{N}; chart version 0.0.0-<image-tag> (_ in image tag → - in chart).
# ${owner} and ${tag} in image lines are substituted by charts-values-update-action (version-replace-method: parse).
# Other ${VAR} placeholders stay unresolved in the published chart and are substituted at deploy time.
charts:
  - name: qubership-colly
    chart_file: charts/qubership-colly/Chart.yaml
    values_file: charts/qubership-colly/values.yaml
    image:
      - ghcr.io/${owner}/envgene-inventory-service:${tag}
      - ghcr.io/${owner}/environment-operational-service:${tag}
      - ghcr.io/${owner}/ui-service:${tag}
