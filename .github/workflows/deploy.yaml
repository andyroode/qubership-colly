# Manual deploy of a published Helm chart to EKS.
# Run after a successful Build workflow (fork, publish enabled).
name: Deploy Colly

on:
  workflow_dispatch:
    inputs:
      chart-source:
        description: 'Where to load the Helm chart from'
        required: true
        type: choice
        options:
          - oci
          - artifact
        default: oci
      chart-version:
        description: >-
          Chart version from Build workflow (Publish Helm Chart summary).
          Use latest (recommended) or 0.0.0-<run_number> (matches Build workflow run number).
          For artifact source, also selects helm-charts-<version> when using charts-archive.
        required: true
        type: string
        default: latest
      artifact-type:
        description: 'Artifact to download when chart-source=artifact'
        required: true
        type: choice
        options:
          - chart-package
          - charts-archive
        default: chart-package
      image-tag:
        description: >-
          Docker image tag for all Colly services (ghcr.io/<owner>/<service>:<tag>).
          Leave empty to use image refs baked into the chart at publish time (usually latest on main, dev on other branches).
        required: false
        default: ''
        type: string
      helm-dry-run:
        description: 'Helm dry-run only (render manifests, do not apply)'
        required: false
        default: false
        type: boolean

env:
  HELM_PACKAGE_NAME: colly-stack
  COLLY_EKS_CLUSTER: Qubership-pioneer
  COLLY_INSTALL_NAMESPACE: qubership-colly-test

permissions:
  contents: read
  packages: read
  actions: read

jobs:
  deploy:
    name: Deploy to EKS
    if: github.event.repository.fork == true
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Verify tools
        run: |
          kubectl version --client
          helm version
          aws --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Configure kubeconfig for EKS
        env:
          EKS_CLUSTER: ${{ vars.TF_VAR_EKS_NEW_CLUSTERNAME || env.COLLY_EKS_CLUSTER }}
        run: |
          echo "EKS cluster: ${EKS_CLUSTER}"
          aws eks update-kubeconfig \
            --region "${{ vars.AWS_REGION || 'us-east-1' }}" \
            --name "${EKS_CLUSTER}"

      - name: Cluster healthcheck
        env:
          INSTALL_NAMESPACE: ${{ vars.TF_VAR_COLLY_INSTALL_NAMESPACE || env.COLLY_INSTALL_NAMESPACE }}
        run: |
          set -euo pipefail
          echo "### Cluster connectivity"
          kubectl cluster-info
          echo "### Nodes"
          kubectl get nodes -o wide
          ready_nodes="$(kubectl get nodes -o json | jq '[.items[] | select(.status.conditions[]? | select(.type=="Ready" and .status=="True"))] | length')"
          total_nodes="$(kubectl get nodes -o json | jq '.items | length')"
          if [ "${ready_nodes}" -lt 1 ]; then
            echo "::error::No Ready nodes in cluster (ready=${ready_nodes}, total=${total_nodes})"
            exit 1
          fi
          echo "Ready nodes: ${ready_nodes}/${total_nodes}"
          echo "### Namespace pre-check: ${INSTALL_NAMESPACE}"
          if ! kubectl get namespace "${INSTALL_NAMESPACE}" >/dev/null 2>&1; then
            echo "::error::Namespace ${INSTALL_NAMESPACE} does not exist. Create it before deploy."
            exit 1
          fi
          phase="$(kubectl get namespace "${INSTALL_NAMESPACE}" -o jsonpath='{.status.phase}')"
          echo "Namespace exists (phase=${phase})"
          if [ "${phase}" != "Active" ]; then
            echo "::error::Namespace ${INSTALL_NAMESPACE} is not Active"
            exit 1
          fi

      - name: Resolve deploy parameters
        id: params
        shell: bash
        env:
          IMAGE_TAG_INPUT: ${{ github.event.inputs.image-tag }}
          CHART_SOURCE: ${{ github.event.inputs.chart-source }}
          CHART_VERSION: ${{ github.event.inputs.chart-version }}
          ARTIFACT_TYPE: ${{ github.event.inputs.artifact-type }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          chart_ref="oci://ghcr.io/${owner}/${{ env.HELM_PACKAGE_NAME }}/qubership-colly"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "chart_ref=${chart_ref}" >> "$GITHUB_OUTPUT"
          echo "chart_source=${CHART_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "artifact_type=${ARTIFACT_TYPE}" >> "$GITHUB_OUTPUT"
          {
            echo "## Deploy parameters"
            echo "- Chart source: \`${CHART_SOURCE}\`"
            if [ "${CHART_SOURCE}" = "oci" ]; then
              echo "- Chart: \`${chart_ref}\`"
            else
              echo "- Artifact type: \`${ARTIFACT_TYPE}\`"
              if [ "${ARTIFACT_TYPE}" = "chart-package" ]; then
                echo "- Artifact name: \`released-charts\` (packaged \`.tgz\`)"
              else
                echo "- Artifact name: \`helm-charts-<version>\` (source \`helm-charts.tar.gz\`)"
              fi
            fi
            echo "- Chart version: \`${CHART_VERSION}\`"
            if [ -n "${IMAGE_TAG_INPUT}" ]; then
              echo "- Image tag override: \`${IMAGE_TAG_INPUT}\`"
              echo "  - \`ghcr.io/${owner}/envgene-inventory-service:${IMAGE_TAG_INPUT}\`"
              echo "  - \`ghcr.io/${owner}/environment-operational-service:${IMAGE_TAG_INPUT}\`"
              echo "  - \`ghcr.io/${owner}/ui-service:${IMAGE_TAG_INPUT}\`"
            else
              echo "- Image tag override: _(none — use refs from published chart)_"
            fi
            echo "- Namespace: \`${{ vars.TF_VAR_COLLY_INSTALL_NAMESPACE || env.COLLY_INSTALL_NAMESPACE }}\`"
            echo "- Helm release: \`${{ vars.COLLY_HELM_RELEASE || vars.TF_VAR_COLLY_INSTALL_NAMESPACE || env.COLLY_INSTALL_NAMESPACE }}\`"
            echo "- Secrets: substituted at deploy into chart values (not stored in GHCR package or artifacts)"
            echo "- Helm dry-run: \`${{ github.event.inputs.helm-dry-run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve chart version and Build run
        id: chart_resolve
        shell: bash
        env:
          CHART_SOURCE: ${{ github.event.inputs.chart-source }}
          CHART_VERSION: ${{ github.event.inputs.chart-version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          resolve_chart_version="${CHART_VERSION}"
          workflow_file="cicd-pipeline.yaml"

          if [ "${CHART_SOURCE}" = "oci" ] && [ "${resolve_chart_version}" = "latest" ]; then
            owner="${GITHUB_REPOSITORY_OWNER,,}"
            repo_path="${owner}/${{ env.HELM_PACKAGE_NAME }}/qubership-colly"
            echo "Resolving latest chart version from GHCR tags (helm requires SemVer, not latest)"
            ghcr_token="$(curl -fsSL -u "${{ github.actor }}:${GH_TOKEN}" \
              "https://ghcr.io/token?scope=repository:${repo_path}:pull" | jq -r '.token')"
            tags="$(curl -fsSL -H "Authorization: Bearer ${ghcr_token}" \
              "https://ghcr.io/v2/${repo_path}/tags/list" | jq -r '.tags[]? // empty')"
            resolve_chart_version="$(echo "${tags}" | grep -E '^0\.0\.0-[0-9]+$' | sort -t'-' -k2 -n | tail -1)"
            if [ -z "${resolve_chart_version}" ]; then
              resolve_chart_version="$(echo "${tags}" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)"
            fi
            if [ -z "${resolve_chart_version}" ]; then
              echo "::error::No chart version tags found in ghcr.io/${repo_path}"
              exit 1
            fi
            echo "Latest OCI chart version: ${resolve_chart_version}"
          fi

          if [ "${CHART_SOURCE}" = "artifact" ]; then
            if [ "${resolve_chart_version}" = "latest" ]; then
              run_id="$(gh api \
                "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?status=success&per_page=1" \
                --jq '.workflow_runs[0].id')"
              run_number="$(gh api \
                "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?status=success&per_page=1" \
                --jq '.workflow_runs[0].run_number')"
              if [ -z "${run_id}" ] || [ "${run_id}" = "null" ]; then
                echo "::error::No successful Build workflow runs found for artifact download"
                exit 1
              fi
              resolve_chart_version="0.0.0-${run_number}"
              echo "Latest Build run: id=${run_id}, chart version=${resolve_chart_version}"
            else
              run_number="${resolve_chart_version#0.0.0-}"
              if [ "${run_number}" = "${resolve_chart_version}" ] || ! [[ "${run_number}" =~ ^[0-9]+$ ]]; then
                echo "::error::Artifact source requires chart-version latest or 0.0.0-<run_number>"
                exit 1
              fi
              run_id="$(gh api \
                "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?status=success&per_page=100" \
                --jq ".workflow_runs[] | select(.run_number==${run_number}) | .id" | head -1)"
              if [ -z "${run_id}" ]; then
                echo "::error::No successful Build workflow run with run_number=${run_number}"
                exit 1
              fi
              echo "Resolved Build run id=${run_id} for chart version ${resolve_chart_version}"
            fi
            echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          fi

          echo "resolve_chart_version=${resolve_chart_version}" >> "$GITHUB_OUTPUT"

      - name: Fetch chart from GHCR (OCI)
        if: github.event.inputs.chart-source == 'oci'
        id: fetch_oci
        shell: bash
        env:
          CHART_REF: ${{ steps.params.outputs.chart_ref }}
          RESOLVE_CHART_VERSION: ${{ steps.chart_resolve.outputs.resolve_chart_version }}
        run: |
          set -euo pipefail
          chart_dir="$(mktemp -d)"
          echo "Pulling ${CHART_REF} version ${RESOLVE_CHART_VERSION}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
          helm pull "${CHART_REF}" --version "${RESOLVE_CHART_VERSION}" --untar -d "${chart_dir}"
          helm registry logout ghcr.io
          echo "chart_path=${chart_dir}/qubership-colly" >> "$GITHUB_OUTPUT"
          echo "CHART_PATH=${chart_dir}/qubership-colly" >> "$GITHUB_ENV"

      - name: Download packaged chart artifact (released-charts)
        if: github.event.inputs.chart-source == 'artifact' && github.event.inputs.artifact-type == 'chart-package'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.chart_resolve.outputs.run_id }}
          name: released-charts
          path: ./chart-artifact

      - name: Download charts source archive artifact
        if: github.event.inputs.chart-source == 'artifact' && github.event.inputs.artifact-type == 'charts-archive'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.chart_resolve.outputs.run_id }}
          name: helm-charts-${{ steps.chart_resolve.outputs.resolve_chart_version }}
          path: ./chart-artifact

      - name: Extract chart from artifact
        if: github.event.inputs.chart-source == 'artifact'
        shell: bash
        env:
          ARTIFACT_TYPE: ${{ github.event.inputs.artifact-type }}
        run: |
          set -euo pipefail
          chart_dir="$(mktemp -d)"
          if [ "${ARTIFACT_TYPE}" = "chart-package" ]; then
            shopt -s nullglob
            packages=(./chart-artifact/*.tgz)
            if [ "${#packages[@]}" -eq 0 ]; then
              echo "::error::No .tgz found in released-charts artifact (was upload-helm-tarball enabled in Build?)"
              exit 1
            fi
            tar -xzf "${packages[0]}" -C "${chart_dir}"
          else
            archive="./chart-artifact/helm-charts.tar.gz"
            if [ ! -f "${archive}" ]; then
              echo "::error::helm-charts.tar.gz not found in artifact (was upload-helm-tarball enabled in Build?)"
              exit 1
            fi
            tar -xzf "${archive}" -C "${chart_dir}"
          fi
          if [ ! -d "${chart_dir}/qubership-colly" ]; then
            echo "::error::Extracted chart directory qubership-colly not found"
            exit 1
          fi
          echo "CHART_PATH=${chart_dir}/qubership-colly" >> "$GITHUB_ENV"

      - name: Validate GitHub secrets
        shell: bash
        env:
          PROJECT_GIT_REPO_URL_EXAMPLE: ${{ secrets.PROJECT_GIT_REPO_URL_EXAMPLE }}
          GH_TOKEN_EXAMPLE: ${{ secrets.GH_TOKEN_EXAMPLE }}
          K8S_KEYCLOAK_EXAMPLE: ${{ secrets.K8S_KEYCLOAK_EXAMPLE }}
          REDIS_HOST_EXAMPLE: ${{ secrets.REDIS_HOST_EXAMPLE }}
          REDIS_HOST_ADMIN: ${{ secrets.REDIS_HOST_ADMIN }}
          REDIS_HOST_PASSWORD: ${{ secrets.REDIS_HOST_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            PROJECT_GIT_REPO_URL_EXAMPLE \
            GH_TOKEN_EXAMPLE \
            K8S_KEYCLOAK_EXAMPLE \
            REDIS_HOST_EXAMPLE \
            REDIS_HOST_ADMIN \
            REDIS_HOST_PASSWORD
          do
            value="${!name:-}"
            if [ -z "${value}" ]; then
              echo "::error::Missing repository secret: ${name}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            echo "Configure secrets listed in .github/deploy-settings.example"
            exit 1
          fi

      - name: Deploy Colly stack
        env:
          INSTALL_NAMESPACE: ${{ vars.TF_VAR_COLLY_INSTALL_NAMESPACE || env.COLLY_INSTALL_NAMESPACE }}
          HELM_RELEASE: ${{ vars.COLLY_HELM_RELEASE || vars.TF_VAR_COLLY_INSTALL_NAMESPACE || env.COLLY_INSTALL_NAMESPACE }}
          IMAGE_TAG: ${{ github.event.inputs.image-tag }}
          HELM_DRY_RUN: ${{ github.event.inputs.helm-dry-run }}
          COLLY_HELM_EXTRA_ARGS: ${{ vars.COLLY_HELM_EXTRA_ARGS }}
          COLLY_CLOUD_PUBLIC_HOST: ${{ vars.COLLY_CLOUD_PUBLIC_HOST }}
          PROJECT_GIT_REPO_URL_EXAMPLE: ${{ secrets.PROJECT_GIT_REPO_URL_EXAMPLE }}
          GH_TOKEN_EXAMPLE: ${{ secrets.GH_TOKEN_EXAMPLE }}
          K8S_KEYCLOAK_EXAMPLE: ${{ secrets.K8S_KEYCLOAK_EXAMPLE }}
          REDIS_HOST_EXAMPLE: ${{ secrets.REDIS_HOST_EXAMPLE }}
          REDIS_HOST_ADMIN: ${{ secrets.REDIS_HOST_ADMIN }}
          REDIS_HOST_PASSWORD: ${{ secrets.REDIS_HOST_PASSWORD }}
        run: |
          set -euo pipefail
          owner="${{ steps.params.outputs.owner }}"
          chart_path="${CHART_PATH:?Chart path not set — fetch step failed}"
          helm_set_args=(--set "NAMESPACE=${INSTALL_NAMESPACE}")
          if [ -n "${COLLY_CLOUD_PUBLIC_HOST}" ]; then
            helm_set_args+=(--set "CLOUD_PUBLIC_HOST=${COLLY_CLOUD_PUBLIC_HOST}")
          fi
          image_set_args=()
          if [ -n "${IMAGE_TAG}" ]; then
            image_set_args+=(
              --set "colly.envgeneInventoryService.image=ghcr.io/${owner}/envgene-inventory-service:${IMAGE_TAG}"
              --set "colly.environmentOperationalService.image=ghcr.io/${owner}/environment-operational-service:${IMAGE_TAG}"
              --set "colly.uiService.image=ghcr.io/${owner}/ui-service:${IMAGE_TAG}"
            )
          fi
          dry_run_arg=()
          if [ "${HELM_DRY_RUN}" = "true" ]; then
            dry_run_arg=(--dry-run)
          fi
          values_file="${chart_path}/values.yaml"
          envsubst \
            '${PROJECT_GIT_REPO_URL_EXAMPLE} ${GH_TOKEN_EXAMPLE} ${K8S_KEYCLOAK_EXAMPLE} ${REDIS_HOST_EXAMPLE} ${REDIS_HOST_ADMIN} ${REDIS_HOST_PASSWORD}' \
            < "${values_file}" > "${values_file}.tmp"
          mv "${values_file}.tmp" "${values_file}"
          echo "Applied secret placeholders in chart values"
          echo "Deploying to namespace ${INSTALL_NAMESPACE} from ${chart_path}"
          # shellcheck disable=SC2086
          helm upgrade --install "${HELM_RELEASE}" "${chart_path}" \
            --namespace "${INSTALL_NAMESPACE}" \
            --wait \
            --timeout 10m \
            "${dry_run_arg[@]}" \
            "${helm_set_args[@]}" \
            "${image_set_args[@]}" \
            ${COLLY_HELM_EXTRA_ARGS}

      - name: Deployment healthcheck
        if: ${{ github.event.inputs.helm-dry-run != true }}
        env:
          INSTALL_NAMESPACE: ${{ vars.TF_VAR_COLLY_INSTALL_NAMESPACE || env.COLLY_INSTALL_NAMESPACE }}
        run: |
          set -euo pipefail
          echo "### Namespace: ${INSTALL_NAMESPACE}"
          kubectl get namespace "${INSTALL_NAMESPACE}" -o wide
          kubectl get deployments,services,pods -n "${INSTALL_NAMESPACE}"
          for deploy in envgene-inventory-service environment-operational-service ui-service; do
            if kubectl get deployment "${deploy}" -n "${INSTALL_NAMESPACE}" >/dev/null 2>&1; then
              echo "### Rollout: ${deploy}"
              kubectl rollout status "deployment/${deploy}" -n "${INSTALL_NAMESPACE}" --timeout=10m
            else
              echo "Deployment ${deploy} not present (skipped)"
            fi
          done
          echo "### Pod readiness"
          not_ready="$(kubectl get pods -n "${INSTALL_NAMESPACE}" -o json | jq '[.items[] | select(.status.phase != "Running" and .status.phase != "Succeeded")] | length')"
          if [ "${not_ready}" -gt 0 ]; then
            kubectl get pods -n "${INSTALL_NAMESPACE}" -o wide
            echo "::warning::Some pods are not Running/Succeeded (${not_ready})"
          else
            echo "All pods Running or Succeeded"
          fi
