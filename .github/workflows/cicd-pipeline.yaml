# Fork-only publish: Docker images to ghcr.io/<fork-owner>/...; dev Helm charts to gh-pages (chart-releaser).
# Upstream (Netcracker/qubership-colly) always builds in dry-run and never publishes from this workflow.
name: "Build"

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Additional tags for Docker images (comma separated)'
        required: false
        default: ''
      dry-run:
        description: 'Skip pushing Docker images and dev Helm chart (fork only; upstream never publishes from this workflow)'
        required: false
        default: true
        type: boolean
      publish-helm-chart:
        description: >-
          Publish dev Helm chart to gh-pages and GitHub Release (tag dev-0.0.0-<docker-tag>).
          Fork only; ignored on upstream.
        required: false
        default: true
        type: boolean
      upload-helm-artifacts:
        description: 'Upload packaged chart (.tgz) and charts source archive as workflow artifacts'
        required: false
        default: true
        type: boolean
  push:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write
  statuses: write
  pull-requests: read

jobs:
  conventional-commits:
    uses: ./.github/workflows/pr-conventional-commits.yaml
    secrets: inherit

  link-check:
    uses: ./.github/workflows/link-checker.yaml
    secrets: inherit

  #linters:
  #  uses: ./.github/workflows/super-linter.yaml
  #  secrets: inherit
  #  with:
  #    full_scan: false

  mvn-build:
    needs:
      - conventional-commits
      - link-check
      #- linters
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        component:
          - envgene-inventory-service
          - environment-operational-service
          - ui-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check Docker version
        run: docker version
      - name: Build java
        uses: netcracker/qubership-workflow-hub/actions/maven-snapshot-deploy@main
        with:
          java-version: 21
          maven-command: clean install
          working-directory: ${{ matrix.component }}
          upload-artifact: "true"
          artifact-id: ${{ matrix.component }}
          maven-token: ${{ secrets.GITHUB_TOKEN }}

  prepare-metadata:
    needs: mvn-build
    name: "Prepare Metadata"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      components: ${{ steps.load_component.outputs.components }}
      platforms: ${{ steps.load_component.outputs.platforms }}
      metadata: "${{ steps.calculate_image_tag.outputs.tags }}"
      image_tag: "${{ steps.calculate_image_tag.outputs.value }}"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Publish mode
        shell: bash
        run: |
          {
            echo "## Container publish mode"
            if [ "${{ github.event.repository.fork }}" = "true" ]; then
              echo "Fork repository: on \`main\` images use \`latest\` and \`main\`; other branches use \`<branch-with-hyphens>\` when dry-run is off."
              echo "Dev Helm chart: version \`0.0.0-<docker-tag>\`, GitHub Release \`dev-0.0.0-<docker-tag>\`, index on **gh-pages** when **publish-helm-chart** is on."
              echo "Helm repo: \`helm repo add colly https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/\`"
              echo "Manual run: disable **dry-run** to push images; toggle **publish-helm-chart** / **upload-helm-artifacts** independently."
              echo "Push events on a fork publish charts to gh-pages by default."
              echo "Chart values: \`values.yaml\` image tags are **committed to the current branch** (\`[skip ci]\`)."
              echo "Deploy: **Deploy Colly** with \`chart-source: helm-repo\` and \`chart-version: latest\` or \`0.0.0-<docker-tag>\`."
            else
              echo "Upstream repository: build only (dry-run), no GHCR publish from this workflow."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Load Docker Configuration
        id: load_component
        shell: bash
        run: |
          verify=$(cat "$GITHUB_WORKSPACE/.github/docker-dev-config.json" | jq '
            def verify_structure:
              .components as $components
              | .platforms as $platforms
              | ($components | type == "array")
              and (all($components[]; has("name") and has("file") and has("context")))
              and ($platforms | type == "string");
            verify_structure
            | if . then true else false end
          ')
          if [ "${verify}" == "true" ]; then
            echo "✅ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is valid"
            components=$(jq -c ".components" "$GITHUB_WORKSPACE/.github/docker-dev-config.json")
            platforms=$(jq -c ".platforms" "$GITHUB_WORKSPACE/.github/docker-dev-config.json")
          else
            echo "❗ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is invalid"
            echo "❗ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is invalid" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "components=${components}" >> "$GITHUB_OUTPUT"
          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"

      - name: Calculate branch image tag
        id: calculate_image_tag
        shell: bash
        env:
          EXTRA_TAGS: ${{ github.event.inputs.tags }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          bash "${GITHUB_WORKSPACE}/.github/scripts/calculate-image-tag.sh"
          {
            echo "### Docker image tags"
            if [ "${{ github.ref_name }}" = "main" ]; then
              echo "- Branch: \`main\` (fixed tags)"
              echo "- Tags: \`latest\`, \`main\`"
              echo "- Helm values tag: \`latest\`"
            else
              echo "- Branch tag (hyphens, no increment): \`${{ steps.calculate_image_tag.outputs.value }}\`"
              echo "- Tags for build: \`${{ steps.calculate_image_tag.outputs.tags }}\`"
              echo "- Helm values tag: \`${{ steps.calculate_image_tag.outputs.value }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build Docker Images
    needs: [prepare-metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.prepare-metadata.outputs.components) }}
    steps:
      - name: Docker
        uses: netcracker/qubership-workflow-hub/actions/docker-action@v2.0.5
        with:
          ref: ${{ github.ref }}
          dry-run: ${{ github.event.repository.fork != true || (github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
          download-artifact: true
          download-artifact-path: '.'
          download-artifact-merge-multiple: true
          debug: true
          component: ${{ toJson(matrix.component) }}
          platforms: ${{ needs.prepare-metadata.outputs.platforms }}
          tags: ${{ needs.prepare-metadata.outputs.metadata }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-helm-chart:
    name: Publish Helm Chart
    needs: [build, prepare-metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve Helm publish options
        id: helm_opts
        shell: bash
        run: |
          set -euo pipefail
          publish_helm=false
          upload_artifacts=false
          is_fork="${{ github.event.repository.fork }}"
          is_dispatch="${{ github.event_name == 'workflow_dispatch' }}"
          dry_run="${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}"

          if [ "$is_fork" = "true" ]; then
            if [ "$is_dispatch" = "true" ]; then
              [ "${{ inputs.publish-helm-chart }}" = "true" ] && publish_helm=true
              [ "${{ inputs.upload-helm-artifacts }}" = "true" ] && upload_artifacts=true
            else
              publish_helm=true
              upload_artifacts=true
            fi
          elif [ "$is_dispatch" = "true" ]; then
            [ "${{ inputs.upload-helm-artifacts }}" = "true" ] && upload_artifacts=true
          fi

          if [ "$dry_run" = "true" ]; then
            publish_helm=false
          fi

          package_charts=false
          if [ "$publish_helm" = "true" ] || [ "$upload_artifacts" = "true" ]; then
            package_charts=true
          fi

          {
            echo "publish_helm=${publish_helm}"
            echo "upload_artifacts=${upload_artifacts}"
            echo "package_charts=${package_charts}"
          } >> "$GITHUB_OUTPUT"

      - name: Set chart version
        id: chart_version
        shell: bash
        run: echo "value=0.0.0-${{ needs.prepare-metadata.outputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Update chart values and publish
        id: update_chart
        if: steps.helm_opts.outputs.package_charts == 'true'
        uses: netcracker/qubership-workflow-hub/actions/charts-values-update-action@v2.1.2
        with:
          release-version: ${{ needs.prepare-metadata.outputs.image_tag }}
          chart-version: ${{ steps.chart_version.outputs.value }}
          config-file: .github/helm-chart-dev-config.yaml
          create-release-branch: false
          version-replace-method: parse
          package-charts: true
          publish-charts: false
          default-tag: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Sync chart image tags and commit to branch
        if: >-
          steps.helm_opts.outputs.package_charts == 'true'
          && github.event.repository.fork == true
          && !(github.event_name == 'workflow_dispatch' && inputs.dry-run)
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.prepare-metadata.outputs.image_tag }}
        run: |
          set -euo pipefail
          values_file="charts/qubership-colly/values.yaml"
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          python3 - "${owner}" "${IMAGE_TAG}" "${values_file}" <<'PY'
          import re, sys
          owner, tag, path = sys.argv[1:4]
          text = open(path, encoding="utf-8").read()
          for svc in ("envgene-inventory-service", "environment-operational-service", "ui-service"):
              text = re.sub(
                  rf"(image:\s*ghcr\.io/)[^/]+/{re.escape(svc)}:[^\s]*",
                  rf"\g<1>{owner}/{svc}:{tag}",
                  text,
              )
          open(path, "w", encoding="utf-8").write(text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${values_file}"; then
            echo "::warning::No changes in ${values_file} after sync"
            exit 0
          fi

          git add "${values_file}"
          git commit -m "ci: update image tags to ${IMAGE_TAG} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Publish dev chart to gh-pages
        id: chart_releaser
        if: steps.helm_opts.outputs.publish_helm == 'true' && github.event.repository.fork == true
        uses: netcracker/chart-releaser-action@main
        with:
          release_name_template: "dev-{{ .Version }}"
          mark_as_latest: false
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Create Helm charts source archive (tar.gz)
        if: steps.helm_opts.outputs.upload_artifacts == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf dist/helm-charts.tar.gz -C charts .

      - name: Upload packaged chart artifact
        if: steps.helm_opts.outputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: released-charts
          path: .cr-release-packages/*.tgz
          retention-days: 30

      - name: Upload Helm charts source archive (tar.gz)
        if: steps.helm_opts.outputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts-${{ steps.chart_version.outputs.value }}
          path: dist/helm-charts.tar.gz
          retention-days: 30

      - name: Helm publish summary
        shell: bash
        env:
          PUBLISH_HELM: ${{ steps.helm_opts.outputs.publish_helm }}
          UPLOAD_ARTIFACTS: ${{ steps.helm_opts.outputs.upload_artifacts }}
          PACKAGE_CHARTS: ${{ steps.helm_opts.outputs.package_charts }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${{ github.event.repository.name }}"
          chart_version="${{ steps.chart_version.outputs.value }}"
          release_tag="dev-${chart_version}"
          {
            echo "## Helm chart (dev)"
            echo "- Chart: \`qubership-colly\`"
            echo "- Docker image tag in values: \`${{ needs.prepare-metadata.outputs.image_tag }}\`"
            echo "- Chart version: \`${chart_version}\`"
            if [ "${PACKAGE_CHARTS}" != "true" ]; then
              echo "- Helm packaging skipped (**publish-helm-chart** and **upload-helm-artifacts** are both off)."
            else
              if [ "${PUBLISH_HELM}" = "true" ]; then
                echo "- GitHub Release tag: \`${release_tag}\` (pre-release)"
                echo "- gh-pages index: \`https://${owner}.github.io/${repo}/\`"
                echo "- Install:"
                echo "  \`helm repo add colly https://${owner}.github.io/${repo}/\`"
                echo "  \`helm install colly colly/qubership-colly --version ${chart_version}\`"
                echo "- **Deploy Colly** (recommended: \`chart-source: helm-repo\`):"
                echo "  - \`chart-version\`: \`latest\` or \`${chart_version}\`"
                if [ -n "${{ steps.chart_releaser.outputs.changed_charts }}" ]; then
                  echo "- chart-releaser updated: \`${{ steps.chart_releaser.outputs.changed_charts }}\`"
                fi
              else
                echo "- gh-pages publish skipped (dry-run or **publish-helm-chart** off)."
              fi
              if [ "${UPLOAD_ARTIFACTS}" = "true" ]; then
                echo "- Workflow artifacts:"
                echo "  - \`released-charts\` — packaged chart \`.tgz\`"
                echo "  - \`helm-charts-${chart_version}\` — source \`helm-charts.tar.gz\`"
                echo "- **Deploy Colly** (\`chart-source: release\` or \`artifact\`)"
              else
                echo "- Workflow artifacts skipped (**upload-helm-artifacts** off)."
              fi
              echo "- \`image-tag\` (Deploy Colly, optional): \`${{ needs.prepare-metadata.outputs.image_tag }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
