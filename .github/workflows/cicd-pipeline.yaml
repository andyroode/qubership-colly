# Fork-only publish: images and Helm charts are pushed to ghcr.io/<fork-owner>/... on push to a fork.
# Upstream (Netcracker/qubership-colly) always builds in dry-run and never publishes from this workflow.
name: "Build"

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Additional tags for Docker images (comma separated)'
        required: false
        default: ''
      dry-run:
        description: 'Skip pushing images and Helm charts (fork only; upstream never publishes from this workflow)'
        required: false
        default: true
        type: boolean
      deploy:
        description: 'Deploy to EKS after publish (fork only; push to fork always deploys when publish runs)'
        required: false
        default: false
        type: boolean
      helm-dry-run:
        description: 'Helm dry-run only for deploy (no changes applied to cluster)'
        required: false
        default: false
        type: boolean
  push:

env:
  # GHCR OCI package path (chart name in repo stays qubership-colly)
  HELM_PACKAGE_NAME: colly-stack

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write
  statuses: write
  pull-requests: read

jobs:
  conventional-commits:
    uses: ./.github/workflows/pr-conventional-commits.yaml
    secrets: inherit

  link-check:
    uses: ./.github/workflows/link-checker.yaml
    secrets: inherit

  #linters:
  #  uses: ./.github/workflows/super-linter.yaml
  #  secrets: inherit
  #  with:
  #    full_scan: false

  mvn-build:
    needs:
      - conventional-commits
      - link-check
      #- linters
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        component:
          - envgene-inventory-service
          - environment-operational-service
          - ui-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check Docker version
        run: docker version
      - name: Build java
        uses: netcracker/qubership-workflow-hub/actions/maven-snapshot-deploy@main
        with:
          java-version: 21
          maven-command: clean install
          working-directory: ${{ matrix.component }}
          upload-artifact: "true"
          artifact-id: ${{ matrix.component }}
          maven-token: ${{ secrets.GITHUB_TOKEN }}

  prepare-metadata:
    needs: mvn-build
    name: "Prepare Metadata"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      components: ${{ steps.load_component.outputs.components }}
      platforms: ${{ steps.load_component.outputs.platforms }}
      metadata: "${{ steps.calculate_image_tag.outputs.tags }}"
      image_tag: "${{ steps.calculate_image_tag.outputs.value }}"
      chart_version: "${{ steps.calculate_image_tag.outputs.chart_version }}"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Publish mode
        shell: bash
        run: |
          {
            echo "## Container publish mode"
            if [ "${{ github.event.repository.fork }}" = "true" ]; then
              echo "Fork dev versioning: [.github/dev-versioning.md](.github/dev-versioning.md) — image \`{branch}-v{N}\` (hyphens), chart \`0.0.0-{image-tag}\`."
              echo "Helm chart: \`oci://ghcr.io/${{ github.repository_owner }}/${{ env.HELM_PACKAGE_NAME }}/qubership-colly:<chart-version>\` when dry-run is off."
              echo "Manual run: disable **dry-run** to push; push events publish automatically."
              echo "After publish: deploy to EKS (push on fork, or manual run with **deploy** enabled)."
            else
              echo "Upstream repository: build only (dry-run), no GHCR publish from this workflow."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Load Docker Configuration
        id: load_component
        shell: bash
        run: |
          verify=$(cat "$GITHUB_WORKSPACE/.github/docker-dev-config.json" | jq '
            def verify_structure:
              .components as $components
              | .platforms as $platforms
              | ($components | type == "array")
              and (all($components[]; has("name") and has("file") and has("context")))
              and ($platforms | type == "string");
            verify_structure
            | if . then true else false end
          ')
          if [ "${verify}" == "true" ]; then
            echo "✅ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is valid"
            components=$(jq -c ".components" "$GITHUB_WORKSPACE/.github/docker-dev-config.json")
            platforms=$(jq -c ".platforms" "$GITHUB_WORKSPACE/.github/docker-dev-config.json")
          else
            echo "❗ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is invalid"
            echo "❗ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is invalid" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "components=${components}" >> "$GITHUB_OUTPUT"
          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"

      - name: Calculate branch image tag
        id: calculate_image_tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXTRA_TAGS: ${{ github.event.inputs.tags }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/calculate-image-tag.sh"

  build:
    name: Build Docker Images
    needs: [prepare-metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.prepare-metadata.outputs.components) }}
    steps:
      - name: Docker
        uses: netcracker/qubership-workflow-hub/actions/docker-action@v2.0.5
        with:
          ref: ${{ github.ref }}
          dry-run: ${{ github.event.repository.fork != true || (github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
          download-artifact: true
          download-artifact-path: '.'
          download-artifact-merge-multiple: true
          debug: true
          component: ${{ toJson(matrix.component) }}
          platforms: ${{ needs.prepare-metadata.outputs.platforms }}
          tags: ${{ needs.prepare-metadata.outputs.metadata }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-helm-chart:
    name: Publish Helm Chart
    needs: [build, prepare-metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Update chart values
        id: update_chart
        uses: netcracker/qubership-workflow-hub/actions/charts-values-update-action@v2.1.2
        with:
          release-version: ${{ needs.prepare-metadata.outputs.image_tag }}
          chart-version: ${{ needs.prepare-metadata.outputs.chart_version }}
          config-file: .github/helm-chart-dev-config.yaml
          create-release-branch: false
          version-replace-method: parse
          package-charts: false
          publish-charts: false
          default-tag: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Package Helm chart
        id: package_chart
        shell: bash
        env:
          CHART_VERSION: ${{ needs.prepare-metadata.outputs.chart_version }}
        run: |
          set -euo pipefail
          chart_dir="${GITHUB_WORKSPACE}/charts/qubership-colly"
          sed -i "s|^version:.*|version: ${CHART_VERSION}|" "${chart_dir}/Chart.yaml"
          mkdir -p "${GITHUB_WORKSPACE}/.cr-release-packages"
          helm package "${chart_dir}" --destination "${GITHUB_WORKSPACE}/.cr-release-packages"
          echo "Packaged chart \`${CHART_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish helm chart package to GHCR
        if: ${{ github.event.repository.fork == true && !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
        shell: bash
        env:
          CHART_VERSION: ${{ needs.prepare-metadata.outputs.chart_version }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          chart_tgz="$(ls "${GITHUB_WORKSPACE}/.cr-release-packages/"*.tgz)"
          chart_oci="oci://ghcr.io/${owner}/${{ env.HELM_PACKAGE_NAME }}/qubership-colly"

          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
          helm push "${chart_tgz}" "oci://ghcr.io/${owner}/${{ env.HELM_PACKAGE_NAME }}"

          verify_dir="$(mktemp -d)"
          helm pull "${chart_oci}" --version "${CHART_VERSION}" -d "${verify_dir}"
          rm -rf "${verify_dir}"

          helm registry logout ghcr.io
          {
            echo "Published \`${chart_oci}:${CHART_VERSION}\`"
            echo ""
            echo "**Pull (not \`docker pull\`):**"
            echo "\`\`\`"
            echo "helm registry login ghcr.io -u USER --password-stdin"
            echo "helm pull ${chart_oci} --version ${CHART_VERSION}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Helm publish summary
        shell: bash
        env:
          PUBLISH_CHARTS: ${{ github.event.repository.fork == true && !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
          HELM_PACKAGE: ${{ env.HELM_PACKAGE_NAME }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          {
            echo "## Helm chart"
            echo "- Chart in repo: \`qubership-colly\` (unchanged)"
            echo "- GHCR package: \`${HELM_PACKAGE}\`"
            echo "- Image tag: \`${{ needs.prepare-metadata.outputs.image_tag }}\`"
            echo "- Chart version: \`${{ needs.prepare-metadata.outputs.chart_version }}\`"
            if [ "${PUBLISH_CHARTS}" = "true" ]; then
              echo "- \`helm pull oci://ghcr.io/${owner}/${HELM_PACKAGE}/qubership-colly --version ${{ needs.prepare-metadata.outputs.chart_version }}\`"
            else
              echo "- Chart packaged locally (publish skipped: dry-run or upstream)."
            fi
            echo "- Artifact: \`released-charts\` (packaged .tgz from this job)"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to EKS
    needs: [publish-helm-chart, prepare-metadata]
    if: >-
      ${{ always() &&
      needs.publish-helm-chart.result == 'success' &&
      needs.prepare-metadata.result == 'success' &&
      github.event.repository.fork == true &&
      !(github.event_name == 'workflow_dispatch' && inputs.dry-run) &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)) }}
    uses: ./.github/workflows/deploy.yaml
    with:
      chart-version: ${{ needs.prepare-metadata.outputs.chart_version }}
      image-tag: ''
      helm-dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.helm-dry-run }}
    secrets: inherit
