# Fork-only publish: images and Helm charts are pushed to ghcr.io/<fork-owner>/... on push to a fork.
# Upstream (Netcracker/qubership-colly) always builds in dry-run and never publishes from this workflow.
name: "Build"

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Additional tags for Docker images (comma separated)'
        required: false
        default: ''
      dry-run:
        description: 'Skip pushing Docker images and Helm chart to GHCR (fork only; upstream never publishes from this workflow)'
        required: false
        default: true
        type: boolean
      publish-helm-oci:
        description: 'Push packaged Helm chart to GHCR (OCI). Fork only; ignored on upstream.'
        required: false
        default: true
        type: boolean
      upload-helm-tarball:
        description: 'Package Helm chart and upload .tgz plus charts source archive (helm-charts.tar.gz) as workflow artifacts'
        required: false
        default: true
        type: boolean
  push:

env:
  # GHCR OCI package path (chart name in repo stays qubership-colly)
  HELM_PACKAGE_NAME: colly-stack

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write
  statuses: write
  pull-requests: read

jobs:
  conventional-commits:
    uses: ./.github/workflows/pr-conventional-commits.yaml
    secrets: inherit

  link-check:
    uses: ./.github/workflows/link-checker.yaml
    secrets: inherit

  #linters:
  #  uses: ./.github/workflows/super-linter.yaml
  #  secrets: inherit
  #  with:
  #    full_scan: false

  mvn-build:
    needs:
      - conventional-commits
      - link-check
      #- linters
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        component:
          - envgene-inventory-service
          - environment-operational-service
          - ui-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check Docker version
        run: docker version
      - name: Build java
        uses: netcracker/qubership-workflow-hub/actions/maven-snapshot-deploy@main
        with:
          java-version: 21
          maven-command: clean install
          working-directory: ${{ matrix.component }}
          upload-artifact: "true"
          artifact-id: ${{ matrix.component }}
          maven-token: ${{ secrets.GITHUB_TOKEN }}

  prepare-metadata:
    needs: mvn-build
    name: "Prepare Metadata"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      components: ${{ steps.load_component.outputs.components }}
      platforms: ${{ steps.load_component.outputs.platforms }}
      metadata: "${{ steps.calculate_image_tag.outputs.tags }}"
      image_tag: "${{ steps.calculate_image_tag.outputs.value }}"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Publish mode
        shell: bash
        run: |
          {
            echo "## Container publish mode"
            if [ "${{ github.event.repository.fork }}" = "true" ]; then
              echo "Fork repository: on \`main\` images use \`latest\` and \`main\`; other branches use \`<branch>_v<N>\` (+ \`dev\`) when dry-run is off."
              echo "Helm chart OCI: \`oci://ghcr.io/${{ github.repository_owner }}/${{ env.HELM_PACKAGE_NAME }}/qubership-colly:<chart-version>\` when **publish-helm-oci** is on and dry-run is off."
              echo "Helm tarballs: \`released-charts\` (.tgz) and \`helm-charts-<version>\` (source \`helm-charts.tar.gz\`) when **upload-helm-tarball** is on."
              echo "Manual run: disable **dry-run** to push images; use **publish-helm-oci** / **upload-helm-tarball** independently."
              echo "Push events on a fork publish OCI and tarballs by default."
              echo "Deploy: run workflow **Deploy Colly** with \`chart-version: latest\`."
            else
              echo "Upstream repository: build only (dry-run), no GHCR publish from this workflow."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Load Docker Configuration
        id: load_component
        shell: bash
        run: |
          verify=$(cat "$GITHUB_WORKSPACE/.github/docker-dev-config.json" | jq '
            def verify_structure:
              .components as $components
              | .platforms as $platforms
              | ($components | type == "array")
              and (all($components[]; has("name") and has("file") and has("context")))
              and ($platforms | type == "string");
            verify_structure
            | if . then true else false end
          ')
          if [ "${verify}" == "true" ]; then
            echo "✅ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is valid"
            components=$(jq -c ".components" "$GITHUB_WORKSPACE/.github/docker-dev-config.json")
            platforms=$(jq -c ".platforms" "$GITHUB_WORKSPACE/.github/docker-dev-config.json")
          else
            echo "❗ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is invalid"
            echo "❗ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is invalid" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "components=${components}" >> "$GITHUB_OUTPUT"
          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"

      - name: Calculate branch image tag
        id: calculate_image_tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXTRA_TAGS: ${{ github.event.inputs.tags }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          bash "${GITHUB_WORKSPACE}/.github/scripts/calculate-image-tag.sh"
          {
            echo "### Docker image tags"
            if [ "${{ github.ref_name }}" = "main" ]; then
              echo "- Branch: \`main\` (fixed tags, no increment)"
              echo "- Tags: \`latest\`, \`main\`"
              echo "- Helm values tag: \`latest\`"
            else
              echo "- Primary tag: \`${{ steps.calculate_image_tag.outputs.value }}\`"
              echo "- Tags for build: \`${{ steps.calculate_image_tag.outputs.tags }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build Docker Images
    needs: [prepare-metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.prepare-metadata.outputs.components) }}
    steps:
      - name: Docker
        uses: netcracker/qubership-workflow-hub/actions/docker-action@v2.0.5
        with:
          ref: ${{ github.ref }}
          dry-run: ${{ github.event.repository.fork != true || (github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
          download-artifact: true
          download-artifact-path: '.'
          download-artifact-merge-multiple: true
          debug: true
          component: ${{ toJson(matrix.component) }}
          platforms: ${{ needs.prepare-metadata.outputs.platforms }}
          tags: ${{ needs.prepare-metadata.outputs.metadata }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-helm-chart:
    name: Publish Helm Chart
    needs: [build, prepare-metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Helm publish options
        id: helm_opts
        shell: bash
        run: |
          set -euo pipefail
          publish_oci=false
          upload_tarball=false
          is_fork="${{ github.event.repository.fork }}"
          is_dispatch="${{ github.event_name == 'workflow_dispatch' }}"
          dry_run="${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}"

          if [ "$is_fork" = "true" ]; then
            if [ "$is_dispatch" = "true" ]; then
              [ "${{ inputs.publish-helm-oci }}" = "true" ] && publish_oci=true
              [ "${{ inputs.upload-helm-tarball }}" = "true" ] && upload_tarball=true
            else
              publish_oci=true
              upload_tarball=true
            fi
          elif [ "$is_dispatch" = "true" ]; then
            [ "${{ inputs.upload-helm-tarball }}" = "true" ] && upload_tarball=true
          fi

          if [ "$dry_run" = "true" ]; then
            publish_oci=false
          fi

          package_charts=false
          if [ "$publish_oci" = "true" ] || [ "$upload_tarball" = "true" ]; then
            package_charts=true
          fi

          {
            echo "publish_oci=${publish_oci}"
            echo "upload_tarball=${upload_tarball}"
            echo "package_charts=${package_charts}"
          } >> "$GITHUB_OUTPUT"

      - name: Set chart version
        id: chart_version
        shell: bash
        run: echo "value=0.0.0-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Update chart values and publish
        id: update_chart
        if: steps.helm_opts.outputs.package_charts == 'true'
        uses: netcracker/qubership-workflow-hub/actions/charts-values-update-action@v2.1.2
        with:
          release-version: ${{ needs.prepare-metadata.outputs.image_tag }}
          chart-version: ${{ steps.chart_version.outputs.value }}
          config-file: .github/helm-chart-dev-config.yaml
          create-release-branch: false
          version-replace-method: parse
          package-charts: true
          publish-charts: false
          default-tag: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create Helm charts source archive (tar.gz)
        if: steps.helm_opts.outputs.upload_tarball == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf dist/helm-charts.tar.gz -C charts .

      - name: Upload Helm charts source archive (tar.gz)
        if: steps.helm_opts.outputs.upload_tarball == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts-${{ steps.chart_version.outputs.value }}
          path: dist/helm-charts.tar.gz
          retention-days: 30

      - name: Publish helm chart package to GHCR
        if: steps.helm_opts.outputs.publish_oci == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          for chart in "${GITHUB_WORKSPACE}/.cr-release-packages/"*.tgz; do
            helm push "${chart}" "oci://ghcr.io/${owner}/${{ env.HELM_PACKAGE_NAME }}"
          done
          helm registry logout ghcr.io

      - name: Helm publish summary
        shell: bash
        env:
          PUBLISH_OCI: ${{ steps.helm_opts.outputs.publish_oci }}
          UPLOAD_TARBALL: ${{ steps.helm_opts.outputs.upload_tarball }}
          PACKAGE_CHARTS: ${{ steps.helm_opts.outputs.package_charts }}
          HELM_PACKAGE: ${{ env.HELM_PACKAGE_NAME }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          {
            echo "## Helm chart"
            echo "- Chart in repo: \`qubership-colly\` (unchanged)"
            echo "- GHCR package: \`${HELM_PACKAGE}\`"
            echo "- Image tag in values: \`${{ needs.prepare-metadata.outputs.image_tag }}\`"
            echo "- Chart version (SemVer in package): \`${{ steps.chart_version.outputs.value }}\`"
            if [ "${PACKAGE_CHARTS}" != "true" ]; then
              echo "- Helm packaging skipped (**publish-helm-oci** and **upload-helm-tarball** are both off)."
            else
              if [ "${PUBLISH_OCI}" = "true" ]; then
                echo "- OCI: \`oci://ghcr.io/${owner}/${HELM_PACKAGE}/qubership-colly --version ${{ steps.chart_version.outputs.value }}\`"
                echo "- **Deploy Colly** (chart-source: \`oci\`):"
                echo "  - \`chart-version\`: \`latest\` or \`${{ steps.chart_version.outputs.value }}\`"
              else
                echo "- OCI publish skipped (dry-run or **publish-helm-oci** off)."
              fi
              if [ "${UPLOAD_TARBALL}" = "true" ]; then
                echo "- Artifacts:"
                echo "  - \`released-charts\` — packaged chart \`.tgz\`"
                echo "  - \`helm-charts-${{ steps.chart_version.outputs.value }}\` — source tree \`helm-charts.tar.gz\`"
                echo "- **Deploy Colly** (chart-source: \`artifact\`, upload-helm-tarball was on):"
                echo "  - \`chart-version\`: \`${{ steps.chart_version.outputs.value }}\` or \`latest\`"
                echo "  - \`artifact-type\`: \`chart-package\` (recommended) or \`charts-archive\`"
              else
                echo "- Tarball artifacts skipped (**upload-helm-tarball** off)."
              fi
              echo "- \`image-tag\` (Deploy Colly, optional): \`${{ needs.prepare-metadata.outputs.image_tag }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
