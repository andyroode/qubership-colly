# Fork-only publish: Docker images to GHCR; dev Helm charts to gh-pages/dev/ (release charts use gh-pages root).
# Upstream (Netcracker/qubership-colly) always builds in dry-run and never publishes from this workflow.
name: "Build"

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Skip pushing Docker images to GHCR (fork only; upstream never publishes from this workflow)'
        required: false
        default: true
        type: boolean
  push:
permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write
  statuses: write
  pull-requests: read

jobs:
  conventional-commits:
    uses: ./.github/workflows/pr-conventional-commits.yaml
    secrets: inherit

  link-check:
    uses: ./.github/workflows/link-checker.yaml
    secrets: inherit

  #linters:
  #  uses: ./.github/workflows/super-linter.yaml
  #  secrets: inherit
  #  with:
  #    full_scan: false

  mvn-build:
    needs:
      - conventional-commits
      - link-check
      #- linters
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        component:
          - envgene-inventory-service
          - environment-operational-service
          - ui-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check Docker version
        run: docker version
      - name: Build java
        uses: netcracker/qubership-workflow-hub/actions/maven-snapshot-deploy@main
        with:
          java-version: 21
          maven-command: clean install
          working-directory: ${{ matrix.component }}
          upload-artifact: "true"
          artifact-id: ${{ matrix.component }}
          maven-token: ${{ secrets.GITHUB_TOKEN }}

  prepare-metadata:
    needs: mvn-build
    name: "Prepare Metadata"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      components: ${{ steps.load_component.outputs.components }}
      platforms: ${{ steps.load_component.outputs.platforms }}
      metadata: "${{ steps.calculate_image_tag.outputs.tags }}"
      image_tag: "${{ steps.calculate_image_tag.outputs.value }}"
      chart_version: "${{ steps.calculate_image_tag.outputs.chart_version }}"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load Docker Configuration
        id: load_component
        shell: bash
        run: |
          verify=$(cat "$GITHUB_WORKSPACE/.github/docker-dev-config.json" | jq '
            def verify_structure:
              .components as $components
              | .platforms as $platforms
              | ($components | type == "array")
              and (all($components[]; has("name") and has("file") and has("context")))
              and ($platforms | type == "string");
            verify_structure
            | if . then true else false end
          ')
          if [ "${verify}" == "true" ]; then
            echo "✅ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is valid"
            components=$(jq -c ".components" "$GITHUB_WORKSPACE/.github/docker-dev-config.json")
            platforms=$(jq -c ".platforms" "$GITHUB_WORKSPACE/.github/docker-dev-config.json")
          else
            echo "❗ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is invalid"
            echo "❗ $GITHUB_WORKSPACE/.github/docker-dev-config.json file is invalid" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "components=${components}" >> "$GITHUB_OUTPUT"
          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"

      - name: Calculate branch image tag
        id: calculate_image_tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" != "branch" ]; then
            echo "::error::Dev builds use branch refs only (no git tags like 1.2.3)"
            exit 1
          fi
          ref_name="${{ github.ref_name }}"
          if [ "$ref_name" = "main" ]; then
            image_tag="latest"
            echo "value=${image_tag}" >> "$GITHUB_OUTPUT"
            echo "tags=latest, main" >> "$GITHUB_OUTPUT"
          else
            image_tag=$(echo "$ref_name" | tr '[:upper:]' '[:lower:]' | sed 's|/|-|g' | sed 's|_|-|g')
            echo "value=${image_tag}" >> "$GITHUB_OUTPUT"
            echo "tags=${image_tag}" >> "$GITHUB_OUTPUT"
          fi
          echo "chart_version=0.0.0-${image_tag}" >> "$GITHUB_OUTPUT"

  build:
    name: Build Docker Images
    needs: [prepare-metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.prepare-metadata.outputs.components) }}
    steps:
      - name: Docker
        uses: netcracker/qubership-workflow-hub/actions/docker-action@v2.0.5
        with:
          ref: ${{ github.ref }}
          dry-run: ${{ github.event.repository.fork != true || (github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
          download-artifact: true
          download-artifact-path: '.'
          download-artifact-merge-multiple: true
          debug: true
          component: ${{ toJson(matrix.component) }}
          platforms: ${{ needs.prepare-metadata.outputs.platforms }}
          tags: ${{ needs.prepare-metadata.outputs.metadata }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-helm-chart:
    name: Publish Helm Chart
    needs: [build, prepare-metadata]
    if: github.event.repository.fork == true && !(github.event_name == 'workflow_dispatch' && inputs.dry-run)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update chart values and package
        id: update_chart
        uses: netcracker/qubership-workflow-hub/actions/charts-values-update-action@v2.1.2
        with:
          release-version: ${{ needs.prepare-metadata.outputs.image_tag }}
          chart-version: ${{ needs.prepare-metadata.outputs.chart_version }}
          config-file: .github/helm-chart-dev-config.yaml
          create-release-branch: false
          version-replace-method: parse
          package-charts: true
          publish-charts: false
          default-tag: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Commit updated chart values to branch
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.prepare-metadata.outputs.image_tag }}
        run: |
          set -euo pipefail
          values_file="charts/qubership-colly/values.yaml"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${values_file}"; then
            echo "No changes in ${values_file}, skipping commit"
            exit 0
          fi

          git add "${values_file}"
          git commit -m "$(cat <<EOF
          ci: update image tags to ${IMAGE_TAG} [skip ci]
          EOF
          )"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "Committed and pushed ${values_file} to ${GITHUB_REF_NAME}"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Publish Helm chart to gh-pages
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHART_VERSION: ${{ needs.prepare-metadata.outputs.chart_version }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(.cr-release-packages/*.tgz)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "::error::No packaged chart .tgz found"
            exit 1
          fi

          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          pages_dir=$(mktemp -d)
          if git ls-remote --exit-code --heads "${remote}" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "${remote}" "${pages_dir}"
          else
            git init -b gh-pages "${pages_dir}"
          fi

          dev_dir="${pages_dir}/dev"
          mkdir -p "${dev_dir}"
          chart_package=$(basename "${packages[0]}")
          cp -f "${packages[0]}" "${dev_dir}/${chart_package}"

          dev_url="${PAGES_URL}/dev"
          if [ -f "${dev_dir}/index.yaml" ]; then
            helm repo index "${dev_dir}" --url "${dev_url}" --merge "${dev_dir}/index.yaml"
          else
            helm repo index "${dev_dir}" --url "${dev_url}"
          fi

          cd "${pages_dir}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dev/
          if git diff --staged --quiet; then
            echo "No changes to publish on gh-pages/dev"
            exit 0
          fi
          git commit -m "Publish dev chart qubership-colly ${CHART_VERSION}"
          git push "${remote}" gh-pages
          echo "Published dev chart ${CHART_VERSION} to gh-pages/dev (${dev_url}/${chart_package})"
