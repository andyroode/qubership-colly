{{- if .Values.colly.uiService.uiEnabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.colly.uiService.serviceName }}-http
  labels:
    name: {{ .Values.colly.uiService.serviceName }}
    app.kubernetes.io/name: {{ .Values.colly.uiService.serviceName }}
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: qubership-colly
    app.kubernetes.io/managed-by: {{ .Values.MANAGED_BY }}
  {{- if .Values.colly.uiService.ingress.http.annotations }}
  annotations:
    {{- toYaml .Values.colly.uiService.ingress.http.annotations | nindent 4 }}
  {{- end }}
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                port:
                  name: web
                name: '{{ .Values.colly.uiService.serviceName }}'
{{- end }}
