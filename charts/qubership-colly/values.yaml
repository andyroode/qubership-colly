---
CLOUD_PUBLIC_HOST:
NAMESPACE: qubership-colly-test
MANAGED_BY: Helm
colly:
  global:
  envgeneInventoryService:
    image: ghcr.io/andyroode/envgene-inventory-service:latest
    serviceName: envgene-inventory-service
    projectRepoUrl: ${PROJECT_GIT_REPO_URL_EXAMPLE}
    projectRepoGitToken: ${GH_TOKEN_EXAMPLE}
    # gitTokens: [ ]
    gitTokens:
       - region: cn
         token: ${GH_TOKEN_EXAMPLE}
    #   - region: mb
    #     token: ghp_token_for_mb
    cronSchedule: 0 0/2 * * * ?
    cloudCoreSupport: false
    idp:
      url: ${K8S_KEYCLOAK_EXAMPLE}
      clientId: envgene-inventory-service
      clientSecret:
    redis:
      hosts: ${REDIS_HOST_EXAMPLE}
      username: ${REDIS_HOST_ADMIN}
      password: ${REDIS_HOST_PASSWORD}
    ports:
      http: 8080
    ingress:
      className: alb
      http:
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
  environmentOperationalService:
    image: ghcr.io/andyroode/environment-operational-service:latest
    serviceName: environment-operational-service
    cronSchedule: 0 0/1 * * * ?
    cloudCoreSupport: false
    idp:
      url: ${K8S_KEYCLOAK_EXAMPLE}
      clientId: environment-operational-service
      clientSecret:
    redis:
      hosts: ${REDIS_HOST_EXAMPLE}
      username: ${REDIS_HOST_ADMIN}
      password: ${REDIS_HOST_PASSWORD}
    sdPatterns:
      product: "(?i)product"
      project: "(?i)project"
    ports:
      http: 8080
    monitoring:
      - key: running-pods
        name: Running Pods
        query: count(kube_pod_status_phase{namespace=~"{namespace}",phase="Running"})
      - key: failed-deployments
        name: Failed Deployments
        query: count(kube_deployment_status_replicas_unavailable{namespace=~"{namespace}"})
  uiService:
    image: ghcr.io/andyroode/ui-service:latest
    serviceName: ui-service
    uiEnabled: true
    idp:
      url: ${K8S_KEYCLOAK_EXAMPLE}
      clientId: colly
    ports:
      http: 3000
    ingress:
      className: alb
      http:
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip